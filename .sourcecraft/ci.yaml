on:
  push:
    - workflows: [deploy]
      filter:
        branches: [main]

workflows:
  deploy:
    tasks:
      - name: deploy_to_prod
        cubes:
          - name: deploy
            image: alpine:latest
            script:
              - apk add --no-cache openssh
              - mkdir -p ~/.ssh
              - |
                cat > ~/.ssh/id_ed25519 << 'EOF'
                $CI_SSH_KEY
                EOF
              - echo "==== FILE CONTENT ===="
              - cat ~/.ssh/id_ed25519
              - echo "==== FILE SIZE ===="
              - wc -c ~/.ssh/id_ed25519
              - echo "==== TRY PARSE ===="
              - ssh-keygen -y -f ~/.ssh/id_ed25519 || echo "KEY INVALID"

