on:
  push:
    - workflows: [deploy]
      filter:
        branches: [main]

workflows:
  deploy:
    secrets:
      - SSH_PRIVATE_KEY_B64
    tasks:
      - name: deploy_to_prod
        cubes:
          - name: deploy
            image: alpine:latest
            script:
              - apk add --no-cache openssh git
              - mkdir -p ~/.ssh
              - echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
              - chmod 600 ~/.ssh/id_ed25519
              - ssh-keyscan -H 94.131.81.77 >> ~/.ssh/known_hosts
              - ssh -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519 zhancare@94.131.81.77 "
                  cd /home/zhancare/zhancare-back &&
                  git pull origin main &&
                  docker compose down &&
                  docker compose up -d --build
                "
