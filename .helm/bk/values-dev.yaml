replicaCount: 1

image:
  repository: git-ci-cd.smartalmaty.kz:8443/opendata/P_NAME
  pullPolicy: IfNotPresent
  tag: "latest"

env:
  open:
    - name: "test"
      value: "test"

imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
#    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: demo.opendata.smartalmaty.kz
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: preprod.smartalmaty.kz
      paths:
        - path: /
          pathType: ImplementationSpecific
#  tls:
#   - secretName: letsencrypt-prod
#     hosts:
#       - demo.opendata.smartalmaty.kz
#       - preprod.smartalmaty.kz


resources:
  requests:
    cpu: 0.2
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []
affinity: {}

pvc:
  enabled: false
  pvcname: media
  pvcpatch: /media
