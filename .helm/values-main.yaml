imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
#    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: opendata.smartalmaty.kz
      paths:
        - path: /exp-admin(/|$)(.*)
          pathType: ImplementationSpecific
    # - host: opendata.smartalmaty.kz
    #   paths:
    #     - path: /sxodim(/|$)(.*)
    #       pathType: ImplementationSpecific
#  tls:
#   - secretName: letsencrypt-prod
#     hosts:
#       - exp-admin.smartalmaty.kz
#       - opendata.smartalmaty.kz


resources:
  requests:
    cpu: 0.2
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []
affinity: {}

pvc:
  enabled: false
  pvcname: media
  pvcpatch: /media
