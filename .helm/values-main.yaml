replicaCount: 1

image:
  repository: git-ci-cd.smartalmaty.kz:8443/opendata/experimental_admin_back
  pullPolicy: IfNotPresent
  tag: "latest"


imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8000


ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
#    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
  hosts:
    - host: exp-admin.smartalmaty.kz
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: smartalmaty-wildcard-0
      hosts:
        - exp-admin.smartalmaty.kz



resources:
  requests:
    cpu: 0.2
    memory: 256Mi
  limits:
    cpu: 1
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []
affinity: {}

pvc:
  enabled: false
  pvcname: media
  pvcpatch: /media
