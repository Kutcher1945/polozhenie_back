{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZhanCare.AI | Secure Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #0e1c26; /* Dark brand background */
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      overflow: hidden;
    }

    .login-wrapper {
      background: rgba(255, 255, 255, 0.07);
      padding: 45px 35px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
      width: 90%;
      max-width: 400px;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header img {
      width: 100%;
      height: auto;
      margin-bottom: 20px;
      object-fit: contain;
    }

    .login-header h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #00cfff; /* Light blue from logo */
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #cccccc;
      display: block;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 0px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: #00cfff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00cfff, #0079ff); /* Light blue to blue */
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    button:hover {
      background: linear-gradient(135deg, #00b8e6, #0066cc);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 20px;
      font-size: 12px;
      color: #aaaaaa;
    }
  </style>
</head>

<body>

<div class="login-wrapper">
  <div class="login-header">
    <img src="{% static 'img/logosaas.png' %}" alt="ZhanCare.AI Logo">
    <h2>Do you want to access swagger?</h2>
  </div>

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      {{ form.username.label_tag }}
      {{ form.username }}
    </div>
    <div class="form-group">
      {{ form.password.label_tag }}
      {{ form.password }}
    </div>
    <button type="submit">Sign In</button>
  </form>

  <div class="footer-text">
    © 2025 ZhanCare.AI. All Rights Reserved.
  </div>
</div>

</body>
</html>
