version: '3.8'

services:
  web:
    build: .
    container_name: django_core
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn mchs_back.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=mchs_back.settings
      - TZ=Asia/Almaty

  celery:
    build: .
    container_name: celery
    command: celery -A mchs_back worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=mchs_back.settings
      - TZ=Asia/Almaty

  celery-beat:
    build: .
    container_name: celery-beat
    command: celery -A mchs_back beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=mchs_back.settings
      - TZ=Asia/Almaty

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6389:6379"
    environment:
      - TZ=Asia/Almaty

  db:
    image: postgis/postgis:13-3.1
    container_name: django-postgis
    environment:
      POSTGRES_DB: db_core
      POSTGRES_USER: itry
      POSTGRES_PASSWORD: admin123456@
      TZ: Asia/Almaty
    ports:
      - "6590:5439"
